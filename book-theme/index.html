<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>一本书 v2 — 胡桃木书房</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --walnut-dark:#1a0f08;
  --walnut-mid:#2d1a0e;
  --walnut-light:#3d2414;
  --walnut-grain:#4a2c18;
  --walnut-highlight:#6b3d20;
  --lamp-gold:#f5c842;
  --lamp-warm:#ff9d2e;
  --lamp-glow:rgba(255,180,60,0.18);
  --paper:#f8f3e8;
  --paper-aged:#f0e8d0;
  --paper-dark:#e8dcc0;
  --ink:#1c1208;
  --ink-mid:#3a2d1a;
  --ink-light:#6b5a3e;
  --bookmark-red:#c0392b;
  --bookmark-blue:#1a5276;
  --bookmark-green:#1e6b3d;
  --bookmark-gold:#8b6914;
  --book-spine:#4a1c08;
  --book-cover-bg:#8B1A1A;
  --ease-expo:cubic-bezier(0.16,1,0.3,1);
  --ease-book:cubic-bezier(0.4,0,0.2,1);
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--walnut-dark);
  font-family:'Noto Serif SC',serif;
}

/* ═══════════════════════════════
   DESKTOP / ROOM SCENE
═══════════════════════════════ */
#scene{
  position:relative;
  width:100vw;height:100vh;
  overflow:hidden;
  background:
    radial-gradient(ellipse 60% 40% at 18% 15%, rgba(255,180,60,0.22) 0%, transparent 65%),
    linear-gradient(160deg,#0d0602 0%,#1a0f08 30%,#120a04 100%);
}

/* Walnut wood texture via CSS */
#scene::before{
  content:'';
  position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(92deg, transparent, transparent 3px, rgba(255,200,100,0.012) 3px, rgba(255,200,100,0.012) 6px),
    repeating-linear-gradient(88deg, transparent, transparent 8px, rgba(0,0,0,0.04) 8px, rgba(0,0,0,0.04) 9px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(100,50,10,0.06) 40px, rgba(100,50,10,0.06) 41px);
  pointer-events:none;z-index:1;
}

/* Desktop surface edge */
#scene::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;height:8px;
  background:linear-gradient(0deg,#0a0602,var(--walnut-dark));
  z-index:2;
}

/* ═══════════════════════════════
   LAMP — top left
═══════════════════════════════ */
#lamp{
  position:absolute;
  top:-20px;left:60px;
  width:120px;height:220px;
  z-index:10;
  cursor:pointer;
  user-select:none;
}
#lamp-svg{display:block;}

/* Lamp cone of light */
#lamp-light{
  position:absolute;
  top:160px;left:-80px;
  width:280px;height:340px;
  background:conic-gradient(from 270deg at 140px 0px, transparent 35deg, rgba(255,190,60,0.18) 50deg, rgba(255,210,80,0.22) 65deg, rgba(255,200,70,0.15) 80deg, transparent 95deg);
  pointer-events:none;
  z-index:8;
  animation:lampFlicker 4s ease-in-out infinite;
}
@keyframes lampFlicker{
  0%,100%{opacity:1;}
  47%{opacity:0.92;}
  50%{opacity:1;}
  73%{opacity:0.96;}
  80%{opacity:1;}
}

/* Warm ambient glow circle */
.lamp-glow{
  position:absolute;
  top:80px;left:-40px;
  width:200px;height:120px;
  background:radial-gradient(ellipse, rgba(255,180,60,0.28) 0%, transparent 70%);
  pointer-events:none;z-index:9;
  animation:lampFlicker 4s ease-in-out infinite;
}

/* ═══════════════════════════════
   RECORD PLAYER — top right
═══════════════════════════════ */
#player-area{
  position:absolute;
  top:20px;right:80px;
  width:200px;height:160px;
  z-index:10;
}

#record-player{
  position:absolute;
  top:0;right:0;
  width:130px;height:110px;
}

/* Records */
.record{
  position:absolute;
  width:64px;height:64px;
  border-radius:50%;
  cursor:pointer;
  transition:transform 0.3s var(--ease-expo), box-shadow 0.3s;
  user-select:none;
}
.record:hover{transform:translateY(-4px) rotate(8deg);box-shadow:0 8px 24px rgba(0,0,0,0.6);}
#record1{top:40px;right:140px;}
#record2{top:55px;right:115px;}

.record-on-player{
  position:absolute;
  top:18px;left:18px;
  width:54px;height:54px;
  border-radius:50%;
  animation:spinRecord 2s linear infinite;
  display:none;
}
@keyframes spinRecord{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Tonearm */
#tonearm{
  position:absolute;
  top:8px;right:8px;
  width:4px;height:56px;
  background:linear-gradient(180deg,#c0c0c0,#888);
  border-radius:2px;
  transform-origin:top center;
  transform:rotate(-25deg);
  transition:transform 0.8s var(--ease-expo);
  z-index:5;
}
#tonearm.playing{transform:rotate(-5deg);}

/* ═══════════════════════════════
   BOOK — center
═══════════════════════════════ */
#book-container{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:20;
  perspective:1800px;
}

/* Closed book */
#book-closed{
  width:300px;
  cursor:pointer;
  transition:transform 0.4s var(--ease-expo),filter 0.4s;
  transform-style:preserve-3d;
  position:relative;
}
#book-closed:hover{
  transform:translateY(-8px) rotateY(-8deg);
  filter:drop-shadow(0 20px 40px rgba(0,0,0,0.7));
}

/* Book open — the spread */
#book-open{
  display:none;
  width:min(900px,90vw);
  position:relative;
}

/* Book pages container with 3D */
.book-spread{
  display:flex;
  position:relative;
  filter:drop-shadow(0 30px 60px rgba(0,0,0,0.8));
}

/* Single page */
.book-page{
  width:50%;
  min-height:580px;
  background:var(--paper);
  position:relative;
  overflow:hidden;
  padding:40px 36px 36px;
}
.book-page.left{
  border-radius:4px 0 0 4px;
  background:linear-gradient(100deg,var(--paper-dark) 0%,var(--paper) 12%);
  box-shadow:inset -8px 0 20px rgba(0,0,0,0.12);
}
.book-page.right{
  border-radius:0 4px 4px 0;
  background:linear-gradient(260deg,var(--paper-dark) 0%,var(--paper) 12%);
  box-shadow:inset 8px 0 20px rgba(0,0,0,0.08);
}

/* Page lines texture */
.book-page::before{
  content:'';
  position:absolute;inset:0;
  background-image:repeating-linear-gradient(
    transparent, transparent 27px,
    rgba(100,80,40,0.08) 27px, rgba(100,80,40,0.08) 28px
  );
  pointer-events:none;
}

/* Spine */
.book-spine-inner{
  width:20px;
  background:linear-gradient(90deg,#2a1206,#5a2810,#3a1808,#4a2010,#2a1206);
  box-shadow:inset 0 0 10px rgba(0,0,0,0.5);
  position:relative;
  flex-shrink:0;
}

/* Page number */
.page-num{
  position:absolute;
  bottom:16px;
  font-family:'Noto Serif SC',serif;
  font-size:11px;
  color:var(--ink-light);
  opacity:0.7;
}
.book-page.left .page-num{left:36px;}
.book-page.right .page-num{right:36px;}

/* Page header rule */
.page-header-rule{
  border:none;
  border-top:1px solid rgba(100,80,40,0.25);
  margin-bottom:20px;
  margin-top:8px;
}

/* ═══════════════════════════════
   BOOKMARKS (tabs on book)
═══════════════════════════════ */
#bookmarks{
  position:absolute;
  right:-32px;
  top:40px;
  display:flex;
  flex-direction:column;
  gap:4px;
  z-index:30;
}
.bm{
  width:36px;
  height:36px;
  border-radius:0 4px 4px 0;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-family:'Noto Sans SC',sans-serif;
  color:rgba(255,255,255,0.9);
  writing-mode:vertical-rl;
  letter-spacing:0.1em;
  transition:width 0.2s, box-shadow 0.2s;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  box-shadow:2px 2px 6px rgba(0,0,0,0.4);
  font-weight:500;
}
.bm:hover{width:44px;box-shadow:4px 2px 12px rgba(0,0,0,0.5);}
.bm.active{width:42px;}

/* ═══════════════════════════════
   CONTENT INSIDE PAGES
═══════════════════════════════ */
.toc-chapter{
  margin-bottom:20px;
}
.toc-cat{
  font-size:11px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--ink-light);
  font-family:'Noto Sans SC',sans-serif;
  font-weight:500;
  margin-bottom:8px;
  padding-bottom:4px;
  border-bottom:1px solid rgba(100,80,40,0.2);
}
.toc-entry{
  display:flex;
  align-items:baseline;
  gap:4px;
  cursor:pointer;
  padding:3px 0;
  transition:color 0.15s;
  font-size:13px;
  line-height:1.6;
}
.toc-entry:hover .toc-title{color:var(--book-cover-bg);text-decoration:underline;}
.toc-title{
  color:var(--ink);
  font-weight:400;
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.toc-dots{
  flex:1;
  border-bottom:1px dotted rgba(100,80,40,0.3);
  min-width:20px;
  margin:0 4px 3px;
}
.toc-page{
  color:var(--ink-light);
  font-size:12px;
  white-space:nowrap;
  font-family:'Noto Sans SC',sans-serif;
}

/* Article content */
.article-content{
  font-size:14px;
  line-height:1.85;
  color:var(--ink-mid);
  text-align:justify;
  font-family:'Noto Serif SC',serif;
}
.article-content h1{font-size:18px;line-height:1.5;color:var(--ink);margin-bottom:12px;font-weight:700;}
.article-content h2{font-size:15px;color:var(--ink);margin:14px 0 8px;font-weight:600;}
.article-content p{margin-bottom:10px;text-indent:2em;}
.article-content p:first-of-type::first-letter{
  font-size:38px;
  line-height:0.8;
  float:left;
  margin:4px 6px 0 0;
  font-family:'Playfair Display',serif;
  color:var(--book-cover-bg);
  font-weight:700;
}
.article-img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:3px;
  margin:12px 0;
  display:block;
}

/* ═══════════════════════════════
   BOOK PAGE FLIP ANIMATION
═══════════════════════════════ */
.page-flip-out{
  animation:flipOut 0.5s var(--ease-book) forwards;
}
.page-flip-in{
  animation:flipIn 0.5s var(--ease-book) forwards;
}
@keyframes flipOut{
  0%{opacity:1;transform:perspective(800px) rotateY(0deg);}
  100%{opacity:0;transform:perspective(800px) rotateY(-90deg);}
}
@keyframes flipIn{
  0%{opacity:0;transform:perspective(800px) rotateY(90deg);}
  100%{opacity:1;transform:perspective(800px) rotateY(0deg);}
}

/* ═══════════════════════════════
   BOOK OPEN ANIMATION
═══════════════════════════════ */
.book-opening{animation:bookOpen 0.8s var(--ease-expo) forwards;}
@keyframes bookOpen{
  0%{opacity:0;transform:perspective(1200px) rotateX(40deg) scale(0.7);}
  100%{opacity:1;transform:perspective(1200px) rotateX(0deg) scale(1);}
}
.book-closing{animation:bookClose 0.5s var(--ease-expo) forwards;}
@keyframes bookClose{
  0%{opacity:1;transform:perspective(1200px) rotateX(0deg) scale(1);}
  100%{opacity:0;transform:perspective(1200px) rotateX(40deg) scale(0.7);}
}

/* ═══════════════════════════════
   AUDIO indicator
═══════════════════════════════ */
#audio-indicator{
  position:absolute;
  top:8px;right:220px;
  display:none;
  align-items:center;
  gap:4px;
  z-index:15;
}
.audio-bar{
  width:3px;
  background:var(--lamp-gold);
  border-radius:2px;
  animation:audioBar 0.8s ease-in-out infinite;
}
.audio-bar:nth-child(1){height:8px;animation-delay:0s;}
.audio-bar:nth-child(2){height:14px;animation-delay:0.15s;}
.audio-bar:nth-child(3){height:10px;animation-delay:0.3s;}
.audio-bar:nth-child(4){height:6px;animation-delay:0.1s;}
@keyframes audioBar{
  0%,100%{transform:scaleY(0.4);}
  50%{transform:scaleY(1);}
}

/* ═══════════════════════════════
   COPYRIGHT FOOTER
═══════════════════════════════ */
#copyright{
  position:fixed;
  bottom:14px;right:24px;
  z-index:100;
  font-size:11px;
  color:rgba(200,160,80,0.55);
  font-family:'Noto Sans SC',sans-serif;
  letter-spacing:0.05em;
  pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,0.8);
}

/* ═══════════════════════════════
   CLOSE BUTTON
═══════════════════════════════ */
#close-book{
  position:absolute;
  top:-36px;right:0;
  width:28px;height:28px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.7);
  cursor:pointer;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:16px;
  transition:all 0.2s;
  z-index:40;
}
#close-book:hover{background:rgba(200,60,40,0.5);color:#fff;}

/* ═══════════════════════════════
   NAV ARROWS
═══════════════════════════════ */
.page-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:36px;height:36px;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.7);
  cursor:pointer;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:18px;
  transition:all 0.2s;
  z-index:40;
  user-select:none;
}
.page-nav:hover{background:rgba(255,255,255,0.22);color:#fff;}
#nav-prev{left:-48px;}
#nav-next{right:-48px;}

/* ═══════════════════════════════
   DUST PARTICLES
═══════════════════════════════ */
.dust{
  position:absolute;
  border-radius:50%;
  background:rgba(255,200,100,0.3);
  pointer-events:none;
  animation:dustFloat linear infinite;
}
@keyframes dustFloat{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  10%{opacity:0.6;}
  90%{opacity:0.3;}
  100%{transform:translateY(-120px) translateX(30px);opacity:0;}
}

/* ═══════════════════════════════
   TOOLTIP
═══════════════════════════════ */
.tooltip{
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%);
  background:rgba(20,10,4,0.9);
  color:rgba(240,200,120,0.9);
  font-size:11px;
  padding:4px 10px;
  border-radius:4px;
  white-space:nowrap;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.2s;
  font-family:'Noto Sans SC',sans-serif;
}
.record:hover .tooltip{opacity:1;}

/* ═══════════════════════════════
   BOOK COVER SVG styles
═══════════════════════════════ */
#cover-canvas{display:block;border-radius:2px 8px 8px 2px;}
</style>
</head>
<body>

<!-- ═══════════ SCENE ═══════════ -->
<div id="scene">

  <!-- Dust particles (created by JS) -->
  <div id="dust-container"></div>

  <!-- LAMP -->
  <div id="lamp">
    <div class="lamp-glow"></div>
    <svg id="lamp-svg" width="120" height="220" viewBox="0 0 120 220" fill="none">
      <!-- Base -->
      <ellipse cx="60" cy="205" rx="38" ry="8" fill="#0d0804" opacity="0.8"/>
      <rect x="42" y="170" width="36" height="35" rx="4" fill="url(#baseGrad)"/>
      <!-- Pole -->
      <rect x="55" y="100" width="10" height="75" rx="5" fill="url(#poleGrad)"/>
      <!-- Arm bend -->
      <path d="M60 100 Q45 80 35 50" stroke="url(#poleGrad)" stroke-width="9" fill="none" stroke-linecap="round"/>
      <!-- Shade outer -->
      <path d="M8 50 Q35 20 62 22 Q42 55 18 72 Z" fill="url(#shadeOuter)"/>
      <!-- Shade inner (lit) -->
      <path d="M12 52 Q35 24 60 26 Q41 52 20 68 Z" fill="url(#shadeInner)"/>
      <!-- Bulb glow -->
      <circle cx="36" cy="52" r="8" fill="rgba(255,230,100,0.9)" filter="url(#glow)"/>
      <circle cx="36" cy="52" r="5" fill="#fff9d0"/>

      <defs>
        <linearGradient id="baseGrad" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%" stop-color="#2a1408"/>
          <stop offset="50%" stop-color="#5a3018"/>
          <stop offset="100%" stop-color="#3a1c08"/>
        </linearGradient>
        <linearGradient id="poleGrad" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%" stop-color="#4a2810"/>
          <stop offset="50%" stop-color="#8a5030"/>
          <stop offset="100%" stop-color="#3a2010"/>
        </linearGradient>
        <linearGradient id="shadeOuter" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#6b2800"/>
          <stop offset="100%" stop-color="#3a1200"/>
        </linearGradient>
        <linearGradient id="shadeInner" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="rgba(255,210,80,0.4)"/>
          <stop offset="100%" stop-color="rgba(255,160,40,0.1)"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>
    <div id="lamp-light"></div>
  </div>

  <!-- RECORD PLAYER AREA -->
  <div id="player-area">

    <!-- Records (can drag) -->
    <div class="record" id="record1" onclick="putRecordOnPlayer(0)" title="">
      <div class="tooltip">点击播放 · 爵士物语</div>
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="31" fill="#1a0808" stroke="#3a1010" stroke-width="1"/>
        <circle cx="32" cy="32" r="28" fill="none" stroke="#2a1010" stroke-width="0.5"/>
        <circle cx="32" cy="32" r="22" fill="none" stroke="#2a1010" stroke-width="0.5"/>
        <circle cx="32" cy="32" r="14" fill="none" stroke="#2a1010" stroke-width="0.5"/>
        <circle cx="32" cy="32" r="10" fill="#c0392b"/>
        <circle cx="32" cy="32" r="8" fill="#8b1a1a"/>
        <text x="32" y="35" text-anchor="middle" font-size="4" fill="rgba(255,200,180,0.8)" font-family="serif">Jazz</text>
        <circle cx="32" cy="32" r="2" fill="#f0f0f0"/>
        <!-- Grooves -->
        <circle cx="32" cy="32" r="18" fill="none" stroke="#261010" stroke-width="0.8" opacity="0.6"/>
        <circle cx="32" cy="32" r="16" fill="none" stroke="#261010" stroke-width="0.8" opacity="0.5"/>
        <circle cx="32" cy="32" r="25" fill="none" stroke="#261010" stroke-width="0.5" opacity="0.4"/>
        <circle cx="32" cy="32" r="26" fill="none" stroke="#261010" stroke-width="0.5" opacity="0.3"/>
      </svg>
    </div>

    <div class="record" id="record2" onclick="putRecordOnPlayer(1)" title="">
      <div class="tooltip">点击播放 · 古典夜曲</div>
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="31" fill="#080818" stroke="#10102a" stroke-width="1"/>
        <circle cx="32" cy="32" r="28" fill="none" stroke="#10102a" stroke-width="0.5"/>
        <circle cx="32" cy="32" r="22" fill="none" stroke="#10102a" stroke-width="0.5"/>
        <circle cx="32" cy="32" r="14" fill="none" stroke="#10102a" stroke-width="0.5"/>
        <circle cx="32" cy="32" r="10" fill="#1a3a6b"/>
        <circle cx="32" cy="32" r="8" fill="#0d2040"/>
        <text x="32" y="35" text-anchor="middle" font-size="4" fill="rgba(180,200,255,0.8)" font-family="serif">Nocturne</text>
        <circle cx="32" cy="32" r="2" fill="#f0f0f0"/>
        <circle cx="32" cy="32" r="18" fill="none" stroke="#101020" stroke-width="0.8" opacity="0.6"/>
        <circle cx="32" cy="32" r="16" fill="none" stroke="#101020" stroke-width="0.8" opacity="0.5"/>
        <circle cx="32" cy="32" r="25" fill="none" stroke="#101020" stroke-width="0.5" opacity="0.4"/>
      </svg>
    </div>

    <!-- Player device -->
    <svg id="record-player" width="130" height="110" viewBox="0 0 130 110">
      <!-- Player body -->
      <rect x="5" y="20" width="120" height="85" rx="6" fill="url(#playerBody)"/>
      <rect x="5" y="20" width="120" height="85" rx="6" fill="none" stroke="#3a2010" stroke-width="1"/>
      <!-- Turntable -->
      <circle cx="55" cy="65" r="36" fill="#0d0808"/>
      <circle cx="55" cy="65" r="34" fill="#151010"/>
      <circle cx="55" cy="65" r="28" fill="#0a0808" stroke="#1a1010" stroke-width="0.5"/>

function LONG_POST(n) {
  const texts = [
    `那束光穿过薄薄的窗帘，落在书桌上，把昨夜未读完的书页镀成金色。我坐在那里，突然觉得世界安静得像一幅画。\n\n清晨是属于自己的时间。在这个城市尚未苏醒的空隙里，连空气都还带着夜的温度。我泡了一杯茶，热气袅袅升起，像是某种古老仪式的开始。\n\n窗台上有一盆吊兰，叶片在微风中轻轻晃动。它不知道今天是星期几，不知道下周有多少会议，只是安静地生长，把每一缕阳光都吸收进翠绿的叶脉里。\n\n我常常羡慕植物的这种状态——完全活在当下，不焦虑未来，不留恋过去。人能做到这一点吗？也许在某些清晨，某些特定的光线里，可以短暂地接近。\n\n书桌上散落着昨晚的笔记，潦草的字迹记录着一些片刻的想法。有时候我觉得，写作不是为了被人读到，而是为了在思维流淌时留下一条水痕，让自己在某个将来，还能找到回去的路。`,
    `第一口咖啡总是最苦的。你皱起眉头，却还是继续喝下去，因为知道苦涩之后会有回甘。\n\n这也许就是咖啡给我们上的第一课：好东西往往需要先经历不适。\n\n我喜欢在咖啡馆里观察人。形形色色的人坐在这里，各自捧着一杯属于自己的孤独。那个独自工作的女人，半小时没抬过头；角落里的老人，只点了一杯美式，却坐了整个下午；两个朋友对坐，却各看各的手机。\n\n现代人的孤独，往往藏在人群里。\n\n咖啡的苦是诚实的。它不掩饰，不伪装，只是直接告诉你：这就是我，接不接受由你。我们太习惯甜味了，以至于忘记了苦也可以是一种享受——如果你愿意停下来，让味道在口腔里慢慢展开。`,
    `青石板路在雨后显得格外有光泽，像被人仔细擦拭过一样。我走在上面，听着脚步声在巷道里回响，有一种奇异的踏实感。\n\n这条街叫什么名字，我忘了。或者说，它可能从来就没有一个正式的名字。只是城市地图上的一条细线，连接着两个更大的地名。\n\n两侧的建筑参差不齐，有的是清代风格的砖墙，有的是民国时期的石库门，有的干脆就是七八十年代的水泥楼。建筑们不协调地挤在一起，却意外地形成了某种时间的层叠感，像是几个朝代同时出现在一帧胶卷里。\n\n一位老人坐在门口，手里摇着蒲扇，眯着眼看我。也许他每天都坐在这里，看各种各样的陌生人走过，然后各自消失在巷子的转角。我对他点点头，他也点点头。这就是我们全部的交流，却已经足够。`,
    `学会与自己相处，大概是成年之后最难的功课。\n\n小时候，独处是惩罚。被关进房间，哭着喊着要出去。后来慢慢地，独处变成了需要。需要一段时间，不说话，不解释，不表演，只是安静地做自己。\n\n但"做自己"是什么意思？这个问题折磨了我很多年。\n\n我发现，独处最难的不是寂寞，而是面对自己。当外界的噪音消失，内心那些平时被淹没的声音就会浮上来：那些没解决的矛盾，那些假装遗忘的遗憾，那些说好了要处理却一直拖着的事情。\n\n所以很多人害怕独处，其实是害怕和自己真正相处。\n\n但这种面对，是必要的。就像伤口需要通风才能愈合，内心的那些淤积，也需要在安静中慢慢流动、消化、沉淀。`,
    `马尔克斯说，他花了十七年才找到写《百年孤独》的方法：用外祖母讲故事的方式。\n\n什么是外祖母讲故事的方式？\n\n就是把超现实的事情用极度平静的口吻说出来。"何塞·阿尔卡蒂奥·布恩迪亚在栗树下被绑了许多年"——就这一句话，说得好像邻居家的日常。\n\n这种叙事态度改变了一切。当叙述者对奇迹习以为常，读者也会被带入那个世界，开始接受那里的逻辑。\n\n《百年孤独》的时间是螺旋形的。人物的命运在重复，名字在轮回，像是某种神秘的诅咒在代际间传递。你以为在读新的故事，其实在经历相同的悲剧，只是换了一张面孔。\n\n这也许就是马尔克斯对拉丁美洲历史的隐喻：相同的革命，相同的失败，相同的遗忘。`,
    `加缪的哲学让很多人不舒服，因为它太诚实了。\n\n他说：生活是荒诞的。没有先天的意义，没有上帝赐予的目的，我们只是偶然出现在这个宇宙里的生物，苦苦寻找一种宏大叙事来安慰自己。\n\n但他接着说：正因为荒诞，我们才可以自由。\n\n西西弗斯被罚永远推着巨石上山，石头总是会滚下来，他再推上去，如此循环往复。这是惩罚，也是人类处境的隐喻。\n\n"我们应当想象西西弗斯是幸福的。"\n\n这句话第一次读到时，我几乎以为加缪在开玩笑。但他不是。他的意思是：当你接受了荒诞，不再期待巨石留在山顶，每一次推石头的过程本身就成了意义。\n\n反抗荒诞，不是找到意义，而是在无意义中继续活着，继续推石头，并且以某种骄傲的姿态面对这一切。`,
    `村上春树的书里有很多孤独，但那种孤独不让人绝望，反而有一种奇异的慰藉。\n\n为什么？\n\n我想，是因为他把孤独写得非常具体。不是"我很孤独"这种空洞的表达，而是：一个人煮意大利面，听着爵士乐，窗外是东京的夜雨。\n\n具体的孤独是有重量的，有温度的，可以被感知的。它不是一种抽象的痛苦，而是存在本身的质感。\n\n他的主人公总是独自生活，却不显得可怜。他们有自己的仪式：按时烹饪，按时跑步，按时聆听音乐。这些仪式构成了一种有序的内心世界，在混乱的外部现实里，创造出一个小小的庇护所。\n\n孤独不是缺乏连接，而是一种选择的状态。选择和自己在一起，选择用安静来填满时间，选择不需要被认可也能感到完整。`,
    `京都的枫叶，是我见过的最"刻意"的美。\n\n刻意，不是贬义。我的意思是，那种美太完整了，完整到像是被精心设计过的。寺庙、石径、枫林、锦鲤池——每一个元素都在正确的位置，构成一幅不需要修改的画。\n\n岚山的竹林里，风一过，竹叶发出沙沙的声音。那声音让人觉得，自己置身于某个时间之外的地方。\n\n日本人有一个词，"物哀"（もののあわれ）。意思大致是，对事物无常的感知，以及由此产生的温柔的悲伤。秋天的京都，把这个概念具象化了：那些红叶，美丽正因为即将凋零，凋零正因为曾经如此美丽。\n\n我在南禅寺坐了很久。游客来了又走，那棵大枫树只是静静地红着，无动于衷，或者说，它的感情已经超越了情绪的范畴。`,
    `在大理，时间真的会变慢。这不是旅游宣传语，是真的。\n\n第一天你会焦虑：没有wifi，没有行程，下午三点就不知道做什么了。\n\n第二天你开始适应：找了一家小馆子，和老板聊了两个小时，内容完全不重要，就是聊着。\n\n第三天你会发现：慢，其实是一种技能，而不是一种状态。城市里的我们已经忘记了怎么慢下来，就像肌肉萎缩一样，需要重新练习。\n\n苍山是大理的背景，洱海是它的前景，古城是两者之间一块被时间磨圆了边角的石头。本地人骑着电动车穿行，不急不缓，好像整个宇宙都不会催促他们。\n\n我在古城住了六天。离开的时候，真的有点舍不得那种慢。不是因为懒，而是因为那种慢里，藏着某种更接近人本来样子的东西。`,
    `技术从来不是中性的。\n\n我们发明了汽车，于是城市变成了以汽车为单位设计的空间，步行变成了例外而不是默认。我们发明了智能手机，于是注意力变成了商品，时间被切割成无数个碎片。\n\n工具重塑使用者，这个道理并不新鲜。但每一代人都会重新发现它，因为每一次技术革命来临时，都有足够多的诱惑让人暂时忘记这个教训。\n\n问题不是技术本身，而是我们与技术的关系。\n\n一把刀是工具，但当刀开始决定你做什么食物，而不是食物决定你用什么刀，关系就颠倒了。算法本是工具，但当算法开始决定你读什么、看什么、想什么，它就不再只是工具了。\n\n技术与人性的边界，从来就不是一条固定的线，它随着我们的每一次选择移动。问题是，我们有没有意识到自己在做选择。`,
    `仪式感是一种反熵行为。\n\n热力学第二定律说：系统自发地趋向混乱。你的桌子会变乱，关系会变淡，生活会变成一团无差别的重复。\n\n仪式感是对这种趋势的小小抵抗。\n\n它可以很简单：早上固定用某个杯子喝咖啡，周末固定去某家书店逛逛，年底固定写一封信给自己。这些仪式，在混沌的时间流里，打下几颗钉子，让生活不至于完全流走。\n\n形式主义和仪式感的区别在于：形式主义是为了给别人看的表演，仪式感是为了给自己建立意义的私人行为。\n\n当你泡茶的时候，慢慢烧水，慢慢注水，看茶叶在杯中缓缓舒展——这个过程本身就有价值，不需要有人看见，不需要发在朋友圈。\n\n意义是自己赋予的，仪式感是这个赋予行为的具体形式。`,
    `凌晨三点，脑子里最诚实。\n\n白天的我戴着很多层面具：职业的，社交的，家庭的，给自己的。每一层都有各自的台词和姿态。到了凌晨，面具一层层滑落，剩下的才是真正的自己。\n\n失眠不是病，有时候它是内心在要求对话。\n\n那些在脑子里循环播放的事情——未完成的和解，说出口又咽回去的话，关于未来的焦虑，关于过去的执念——它们不是来折磨你的，它们是来被处理的。\n\n凌晨三点的价值在于：没有借口，没有拖延，没有"等有空了再说"。它是时间的一道裂缝，逼着你和那些平时逃避的问题面对面。\n\n有时候，翻来覆去睡不着，索性打开灯，把脑子里的那些东西写下来。不是为了解决，只是为了先看清楚它们。看清楚，有时候就够了。`
  ];
  return texts[(n-1) % texts.length];
}

/* ══════════════════════════════════════════
   PAGINATION ENGINE
══════════════════════════════════════════ */
const LINES_PER_PAGE = 22;       // lines per single page
const LINE_HEIGHT_CHARS = 32;    // ~chars per line

// Build all "pages" from site data
let ALL_PAGES = [];  // [{type:'toc'|'article', leftHtml, rightHtml, leftNum, rightNum}]
let currentSpread = 0; // index into ALL_PAGES (each spread = left+right)

function buildAllPages() {
  ALL_PAGES = [];
  
  // ── TOC spreads ──
  let tocItems = [];
  SITE.categories.forEach(cat => {
    tocItems.push({type:'cat', name: cat.name, color: cat.color});
    cat.posts.forEach(p => {
      tocItems.push({type:'entry', title: p.title, pid: p.pid, cat});
    });
  });

  // Split TOC into pages (left+right)
  const ITEMS_PER_PAGE = 16;
  let leftItems = [], rightItems = [];
  let tocPageCount = Math.ceil(tocItems.length / ITEMS_PER_PAGE);
  
  // TOC always at least one spread
  let halfItems = Math.ceil(tocItems.length / 2);
  leftItems  = tocItems.slice(0, halfItems);
  rightItems = tocItems.slice(halfItems);

  let leftHtml  = buildTocHtml(leftItems, '目  录', 1);
  let rightHtml = buildTocHtml(rightItems, null, 2);
  ALL_PAGES.push({type:'toc', leftHtml, rightHtml, leftNum:1, rightNum:2});

  // ── Article spreads ──
  let pageNum = 3;
  SITE.categories.forEach(cat => {
    cat.posts.forEach(post => {
      // Split article content into lines
      let lines = splitIntoLines(post.content);
      let chunks = [];
      for(let i=0; i<lines.length; i+=LINES_PER_PAGE) {
        chunks.push(lines.slice(i, i+LINES_PER_PAGE));
      }
      
      // First chunk has title, so reduce lines
      let firstChunkLines = LINES_PER_PAGE - 4; // account for title
      let firstChunk = lines.slice(0, firstChunkLines);
      let restLines  = lines.slice(firstChunkLines);
      let restChunks = [];
      for(let i=0; i<restLines.length; i+=LINES_PER_PAGE) {
        restChunks.push(restLines.slice(i, i+LINES_PER_PAGE));
      }
      chunks = [firstChunk, ...restChunks];

      // Build spreads (left + right page)
      for(let c=0; c<chunks.length; c+=2) {
        let left  = buildArticlePageHtml(post, chunks[c], c===0, pageNum, cat);
        let right = c+1 < chunks.length
          ? buildArticlePageHtml(post, chunks[c+1], false, pageNum+1, cat)
          : '<div class="article-content" style="padding-top:40px;text-align:center;color:var(--ink-light);font-size:13px;">— 本篇结束 —</div>';
        ALL_PAGES.push({type:'article', leftHtml:left, rightHtml:right, leftNum:pageNum, rightNum:pageNum+1, postId:post.id, catId:cat.id});
        pageNum += 2;
      }
    });
  });
}

function splitIntoLines(text) {
  let lines = [];
  text.split('\n').forEach(para => {
    if (!para.trim()) { lines.push(''); return; }
    let words = para;
    let charsPerLine = LINE_HEIGHT_CHARS;
    for(let i=0; i<words.length; i+=charsPerLine) {
      lines.push(words.slice(i, i+charsPerLine));
    }
  });
  return lines;
}

function buildArticlePageHtml(post, lines, isFirst, pageNum, cat) {
  let html = '';
  if (isFirst) {
    // Gen placeholder SVG illustration
    const colors = ['#8B1A1A','#1a4a6b','#1e5a30','#6b4a1a','#3a1a5a'];
    const bgColor = colors[post.id % colors.length];
    html += `<div style="margin-bottom:16px;">
      ${genAbstractSVG(280, 100, bgColor, post.id)}
    </div>
    <h1 style="font-size:17px;font-weight:700;color:var(--ink);line-height:1.5;margin-bottom:8px;font-family:'Noto Serif SC',serif;">${post.title}</h1>
    <div style="font-size:11px;color:${cat.color};margin-bottom:12px;font-family:'Noto Sans SC',sans-serif;letter-spacing:0.1em;">${cat.name} · ${SITE.author}</div>
    <hr style="border:none;border-top:1px solid rgba(100,80,40,0.2);margin-bottom:14px;">`;
  }
  
  html += '<div class="article-content">';
  lines.forEach((line, i) => {
    if (!line.trim() && i === 0 && !isFirst) return;
    if (!line.trim()) {
      html += '<br>';
    } else {
      // First paragraph of first page gets drop cap
      if (isFirst && i === 0) {
        html += `<p>${line}</p>`;
      } else {
        html += `<p style="text-indent:2em;margin-bottom:6px;font-size:13.5px;line-height:1.85;">${line}</p>`;
      }
    }
  });
  html += '</div>';
  return html;
}

function genAbstractSVG(w, h, baseColor, seed) {
  // Generate Catcher-in-the-Rye style abstract art
  const rng = mulberry32(seed * 7919);
  const shapes = [];
  const palette = [baseColor, lightenColor(baseColor, 30), '#f5d76e', '#2c3e50', '#e8d5b7'];
  
  for(let i=0; i<8; i++) {
    const x = rng() * w;
    const y = rng() * h;
    const rx = 10 + rng() * 60;
    const ry = 5 + rng() * 40;
    const fill = palette[Math.floor(rng() * palette.length)];
    const rot = rng() * 60 - 30;
    const opacity = 0.4 + rng() * 0.5;
    shapes.push(`<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="${fill}" opacity="${opacity}" transform="rotate(${rot},${x},${y})"/>`);
  }
  // Vertical stripes
  for(let i=0; i<5; i++) {
    const x = rng() * w;
    const sw = 3 + rng() * 15;
    shapes.push(`<rect x="${x}" y="0" width="${sw}" height="${h}" fill="${palette[i%palette.length]}" opacity="${0.15+rng()*0.25}"/>`);
  }
  // Hatching
  for(let i=0; i<6; i++) {
    const y = rng() * h;
    shapes.push(`<line x1="0" y1="${y}" x2="${w}" y2="${y+rng()*20-10}" stroke="${palette[i%3]}" stroke-width="${0.5+rng()*1.5}" opacity="${0.3+rng()*0.4}"/>`);
  }

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="border-radius:3px;display:block;" xmlns="http://www.w3.org/2000/svg">
    <rect width="${w}" height="${h}" fill="${darkenColor(baseColor, 40)}"/>
    ${shapes.join('')}
    <rect width="${w}" height="${h}" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  </svg>`;
}

// RNG
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}
function lightenColor(hex, pct) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+pct)},${Math.min(255,g+pct)},${Math.min(255,b+pct)})`;
}
function darkenColor(hex, pct) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-pct)},${Math.max(0,g-pct)},${Math.max(0,b-pct)})`;
}

/* ══════════════════════════════════════════
   COVER CANVAS — Abstract Art
══════════════════════════════════════════ */
function drawCover() {
  const canvas = document.getElementById('cover-canvas');
  const ctx = canvas.getContext('2d');
  const W = 300, H = 400;
  ctx.clearRect(0, 0, W, H);

  // Sky: deep wheat field colors
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  sky.addColorStop(0, '#2c1a0a');
  sky.addColorStop(0.4, '#8B4513');
  sky.addColorStop(1, '#c8803a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * 0.55);

  // Wheat field
  const field = ctx.createLinearGradient(0, H * 0.45, 0, H * 0.85);
  field.addColorStop(0, '#c8a020');
  field.addColorStop(0.4, '#d4a830');
  field.addColorStop(1, '#8a6810');
  ctx.fillStyle = field;
  ctx.fillRect(0, H * 0.45, W, H * 0.4);

  // Wheat stalks (Catcher style)
  ctx.strokeStyle = 'rgba(180,140,20,0.7)';
  for (let i = 0; i < 60; i++) {
    ctx.beginPath();
    const x = (i / 60) * W + Math.sin(i) * 4;
    const baseY = H * 0.72 + Math.random() * 20;
    ctx.moveTo(x, baseY);
    ctx.bezierCurveTo(x + Math.sin(i*0.5)*8, baseY - 30, x + Math.cos(i*0.3)*6, baseY - 55, x + Math.sin(i*0.7)*5, baseY - 70);
    ctx.lineWidth = 0.8 + Math.random();
    ctx.strokeStyle = `rgba(${160+Math.random()*60},${120+Math.random()*40},${Math.random()*30},0.6)`;
    ctx.stroke();
  }

  // Abstract figure (Holden silhouette hint)
  ctx.fillStyle = 'rgba(20,10,5,0.85)';
  ctx.beginPath();
  ctx.ellipse(W/2, H*0.52, 12, 16, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillRect(W/2 - 8, H*0.55, 16, 35);
  // Red hunting hat hint
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.ellipse(W/2, H*0.49, 14, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Bottom earth
  const earth = ctx.createLinearGradient(0, H*0.85, 0, H);
  earth.addColorStop(0, '#4a2c10');
  earth.addColorStop(1, '#1a0c04');
  ctx.fillStyle = earth;
  ctx.fillRect(0, H*0.85, W, H*0.15);

  // Sky streaks (expressionist)
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.moveTo(0, H * 0.1 + i * 20);
    ctx.bezierCurveTo(W*0.3, H*0.05+i*18, W*0.7, H*0.15+i*22, W, H*0.08+i*20);
    ctx.strokeStyle = `rgba(200,150,60,${0.1+i*0.03})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Red/orange sun low on horizon
  const sunGrad = ctx.createRadialGradient(W*0.75, H*0.48, 0, W*0.75, H*0.48, 28);
  sunGrad.addColorStop(0, 'rgba(255,220,80,0.95)');
  sunGrad.addColorStop(0.4, 'rgba(240,120,30,0.7)');
  sunGrad.addColorStop(1, 'rgba(200,60,20,0)');
  ctx.fillStyle = sunGrad;
  ctx.beginPath();
  ctx.arc(W*0.75, H*0.48, 28, 0, Math.PI*2);
  ctx.fill();

  // Book spine (left edge visual)
  const spine = ctx.createLinearGradient(0, 0, 12, 0);
  spine.addColorStop(0, '#1a0806');
  spine.addColorStop(0.5, '#3a1810');
  spine.addColorStop(1, '#2a1008');
  ctx.fillStyle = spine;
  ctx.fillRect(0, 0, 12, H);

  // Cover text area (bottom)
  const textBg = ctx.createLinearGradient(0, H*0.75, 0, H);
  textBg.addColorStop(0, 'rgba(20,8,4,0)');
  textBg.addColorStop(0.3, 'rgba(20,8,4,0.85)');
  textBg.addColorStop(1, 'rgba(20,8,4,0.98)');
  ctx.fillStyle = textBg;
  ctx.fillRect(0, H*0.72, W, H*0.28);

  // Title
  ctx.fillStyle = '#f5e8c0';
  ctx.font = 'bold 32px "Noto Serif SC", serif';
  ctx.textAlign = 'center';
  ctx.fillText(SITE.name, W/2, H*0.84);

  // Subtitle
  ctx.fillStyle = 'rgba(200,170,100,0.75)';
  ctx.font = '12px "Noto Serif SC", serif';
  ctx.fillText(SITE.subtitle, W/2, H*0.91);

  // Author
  ctx.fillStyle = 'rgba(180,150,90,0.6)';
  ctx.font = '11px "Noto Sans SC", sans-serif';
  ctx.fillText('— ' + SITE.author + ' 著', W/2, H*0.96);

  // Decorative border
  ctx.strokeStyle = 'rgba(180,140,60,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(16, 12, W-28, H-24);
  ctx.strokeStyle = 'rgba(180,140,60,0.2)';
  ctx.strokeRect(20, 16, W-36, H-32);
}

   BOOK INTERACTIONS
══════════════════════════════════════════ */
let bookIsOpen = false;

function openBook() {
  if (bookIsOpen) return;
  bookIsOpen = true;
  
  const closed = document.getElementById('book-closed');
  const open   = document.getElementById('book-open');
  const closeBtn = document.getElementById('close-book');
  const navPrev = document.getElementById('nav-prev');
  const navNext = document.getElementById('nav-next');

  closed.style.display = 'none';
  open.style.display = 'block';
  open.classList.add('book-opening');
  closeBtn.style.display = 'flex';
  navPrev.style.display = 'flex';
  navNext.style.display = 'flex';

  setTimeout(() => open.classList.remove('book-opening'), 800);

  currentSpread = 0;
  renderSpread(currentSpread);
  renderBookmarks();
}

function closeBook() {
  const open = document.getElementById('book-open');
  const closed = document.getElementById('book-closed');
  const closeBtn = document.getElementById('close-book');
  const navPrev = document.getElementById('nav-prev');
  const navNext = document.getElementById('nav-next');

  open.classList.add('book-closing');
  setTimeout(() => {
    open.style.display = 'none';
    open.classList.remove('book-closing');
    closed.style.display = 'block';
    closeBtn.style.display = 'none';
    navPrev.style.display = 'none';
    navNext.style.display = 'none';
    bookIsOpen = false;
  }, 500);
}

function renderSpread(idx) {
  if (idx < 0) idx = 0;
  if (idx >= ALL_PAGES.length) idx = ALL_PAGES.length - 1;
  currentSpread = idx;

  const spread = ALL_PAGES[idx];
  const left  = document.getElementById('page-left');
  const right = document.getElementById('page-right');
  const pnL   = document.getElementById('pnum-left');
  const pnR   = document.getElementById('pnum-right');

  // Content area (above page number)
  left.innerHTML  = spread.leftHtml  + `<span class="page-num" id="pnum-left">${spread.leftNum}</span>`;
  right.innerHTML = spread.rightHtml + `<span class="page-num" id="pnum-right">${spread.rightNum}</span>`;

  // Highlight active bookmark
  document.querySelectorAll('.bm').forEach(bm => {
    bm.classList.remove('active');
    if (spread.catId && bm.dataset.cat === spread.catId) bm.classList.add('active');
    if (spread.type === 'toc') bm.classList.remove('active');
  });
}

function prevPage() {
  if (currentSpread <= 0) return;
  const left = document.getElementById('page-left');
  const right = document.getElementById('page-right');
  left.classList.add('page-flip-out');
  right.classList.add('page-flip-out');
  setTimeout(() => {
    left.classList.remove('page-flip-out');
    right.classList.remove('page-flip-out');
    renderSpread(currentSpread - 1);
    left.classList.add('page-flip-in');
    right.classList.add('page-flip-in');
    setTimeout(() => {
      left.classList.remove('page-flip-in');
      right.classList.remove('page-flip-in');
    }, 500);
  }, 450);
}

function nextPage() {
  if (currentSpread >= ALL_PAGES.length - 1) return;
  const left = document.getElementById('page-left');
  const right = document.getElementById('page-right');
  left.classList.add('page-flip-out');
  right.classList.add('page-flip-out');
  setTimeout(() => {
    left.classList.remove('page-flip-out');
    right.classList.remove('page-flip-out');
    renderSpread(currentSpread + 1);
    left.classList.add('page-flip-in');
    right.classList.add('page-flip-in');
    setTimeout(() => {
      left.classList.remove('page-flip-in');
      right.classList.remove('page-flip-in');
    }, 500);
  }, 450);
}

function goToPost(targetPid) {
  // Find spread with this page num
  let targetSpread = 0;
  for(let i=0; i<ALL_PAGES.length; i++) {
    if (ALL_PAGES[i].leftNum <= targetPid && targetPid <= ALL_PAGES[i].rightNum) {
      targetSpread = i; break;
    }
    if (ALL_PAGES[i].leftNum === targetPid || ALL_PAGES[i].rightNum === targetPid) {
      targetSpread = i; break;
    }
  }
  
  // Multi-flip animation
  const flips = Math.abs(targetSpread - currentSpread);
  const step = targetSpread > currentSpread ? 1 : -1;
  let flipCount = 0;
  
  function doFlip() {
    if (flipCount >= flips) { renderSpread(targetSpread); return; }
    const left = document.getElementById('page-left');
    const right = document.getElementById('page-right');
    left.classList.add('page-flip-out');
    right.classList.add('page-flip-out');
    setTimeout(() => {
      left.classList.remove('page-flip-out');
      right.classList.remove('page-flip-out');
      currentSpread += step;
      renderSpread(currentSpread);
      left.classList.add('page-flip-in');
      right.classList.add('page-flip-in');
      setTimeout(() => {
        left.classList.remove('page-flip-in');
        right.classList.remove('page-flip-in');
        flipCount++;
        if (flipCount < Math.min(flips, 3)) {
          setTimeout(doFlip, 120);
        } else if (flipCount < flips) {
          currentSpread = targetSpread;
          renderSpread(targetSpread);
        }
      }, 300);
    }, 280);
  }
  doFlip();
}

function goToCategory(catId) {
  // Find first spread with this category
  for(let i=0; i<ALL_PAGES.length; i++) {
    if (ALL_PAGES[i].catId === catId) {
      goToPost(ALL_PAGES[i].leftNum);
      return;
    }
  }
  // fallback: toc
  goToPost(1);
}

function renderBookmarks() {
  const container = document.getElementById('bookmarks');
  container.innerHTML = '';
  
  // TOC bookmark
  const tocBm = document.createElement('div');
  tocBm.className = 'bm';
  tocBm.style.background = '#4a2c18';
  tocBm.dataset.cat = 'toc';
  tocBm.textContent = '目录';
  tocBm.title = '返回目录';
  tocBm.onclick = () => {
    currentSpread = 0; renderSpread(0);
  };
  container.appendChild(tocBm);

  SITE.categories.forEach(cat => {
    const bm = document.createElement('div');
    bm.className = 'bm';
    bm.style.background = cat.color;
    bm.dataset.cat = cat.id;
    bm.textContent = cat.name;
    bm.title = `跳转至：${cat.name}`;
    bm.onclick = () => goToCategory(cat.id);
    container.appendChild(bm);
  });
}
